<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    div{
        width: 300px;
        height: 300px;
        position: relative;
        animation-name: try;
        animation-duration:7s ;
        animation-iteration-count: infinite;
        

    }
 @keyframes try{
    0%  {background-color:red; left:0px; top:0px;}
    25% {background-color:green; left:200px; top:0px}
    50% {background-color:blue; left:200px; top:200px}
    75% {background-color:yellow; left:0px; top:200px}
    100% {background-color:violet; left:0px;top:0px}
    }
 
</style>
<body>
    <div> <img style="padding: 50px;" src="try2.jpg" alt="" width="100px" height="100px"></div>
    

</body>
</html>
